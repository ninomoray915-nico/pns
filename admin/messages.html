<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="assets/css/admin.css"><title>留言管理</title></head><body><div class="layout"><aside class="sidebar"><div class="logo">NINO<span>.</span>CMS</div><nav class="nav"><a href="dashboard.html">仪表盘</a><a href="projects.html">作品管理</a><a href="project-edit.html">新增作品</a><a href="messages.html">留言管理</a><a href="#" onclick="logout()">退出登录</a></nav></aside><main class="main">
<div class="topbar"><div><h1>留言管理</h1></div></div><div class="card"><table class="table"><thead><tr><th>姓名</th><th>联系方式</th><th>类型</th><th>状态</th><th>时间</th></tr></thead><tbody id="rows"></tbody></table></div>
<script>(async()=>{if(!await requireAdmin())return;const {data,error}=await supabaseClient.from("messages").select("*").order("created_at",{ascending:false});if(error)return alert(error.message);
rows.innerHTML=(data||[]).map(m=>`<tr><td>${m.name}</td><td>${m.contact}</td><td>${m.project_type||"-"}</td><td>${m.status}</td><td>${new Date(m.created_at).toLocaleString()}</td></tr><tr><td colspan="5" style="color:var(--muted)">${m.message}</td></tr>`).join("")})();</script></main></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/common.js"></script></body></html>
