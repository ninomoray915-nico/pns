<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="assets/css/admin.css"><title>编辑作品</title></head><body><div class="layout"><aside class="sidebar"><div class="logo">NINO<span>.</span>CMS</div><nav class="nav"><a href="dashboard.html">仪表盘</a><a href="projects.html">作品管理</a><a href="project-edit.html">新增作品</a><a href="messages.html">留言管理</a><a href="#" onclick="logout()">退出登录</a></nav></aside><main class="main">
<div class="topbar"><div><h1 id="pageTitle">新增作品</h1></div><button class="btn secondary" onclick="location.href='projects.html'">返回</button></div>
<form id="form" class="card form-grid">
<div class="field"><label>标题</label><input id="title" required></div><div class="field"><label>Slug</label><input id="slug" required placeholder="data-platform"></div>
<div class="field"><label>副标题</label><input id="subtitle"></div><div class="field"><label>分类</label><input id="category"></div>
<div class="field"><label>项目类型</label><input id="project_type"></div><div class="field"><label>年份</label><input id="year" type="number" value="2026"></div>
<div class="field"><label>状态</label><select id="status"><option value="draft">草稿</option><option value="published">已发布</option><option value="archived">归档</option></select></div>
<div class="field"><label>排序</label><input id="sort_order" type="number" value="0"></div><div class="field full"><label>封面图 URL</label><input id="cover_url"></div>
<div class="field full"><label>摘要</label><textarea id="summary"></textarea></div><div class="field full"><label>我的职责</label><textarea id="role"></textarea></div>
<div class="field full"><button class="btn">保存作品</button><p id="result"></p></div></form>
<script>
let id=new URLSearchParams(location.search).get("id");
(async()=>{if(!await requireAdmin())return;if(id){pageTitle.textContent="编辑作品";const {data,error}=await supabaseClient.from("projects").select("*").eq("id",id).single();if(error)return alert(error.message);["title","slug","subtitle","category","project_type","year","status","sort_order","cover_url","summary","role"].forEach(k=>document.getElementById(k).value=data[k]??"")}})();
form.addEventListener("submit",async e=>{e.preventDefault();result.textContent="保存中…";const user=(await supabaseClient.auth.getUser()).data.user;
const p={title:title.value.trim(),slug:slug.value.trim(),subtitle:subtitle.value.trim()||null,category:category.value.trim()||null,project_type:project_type.value.trim()||null,year:Number(year.value)||null,status:status.value,sort_order:Number(sort_order.value)||0,cover_url:cover_url.value.trim()||null,summary:summary.value.trim()||null,role:role.value.trim()||null,created_by:user.id,published_at:status.value==="published"?new Date().toISOString():null};
const q=id?supabaseClient.from("projects").update(p).eq("id",id):supabaseClient.from("projects").insert(p).select("id").single();const {data,error}=await q;if(error){result.className="error";result.textContent=error.message}else{result.className="success";result.textContent="保存成功";if(!id&&data?.id)id=data.id}})</script></main></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/common.js"></script></body></html>
