<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="assets/css/admin.css"><title>仪表盘</title></head><body><div class="layout"><aside class="sidebar"><div class="logo">NINO<span>.</span>CMS</div><nav class="nav"><a href="dashboard.html">仪表盘</a><a href="projects.html">作品管理</a><a href="project-edit.html">新增作品</a><a href="messages.html">留言管理</a><a href="#" onclick="logout()">退出登录</a></nav></aside><main class="main">
<div class="topbar"><div><h1>仪表盘</h1><p style="color:var(--muted)">作品集后台概览</p></div></div>
<div class="grid"><div class="card metric"><span>作品总数</span><b id="a">-</b></div><div class="card metric"><span>已发布</span><b id="b">-</b></div><div class="card metric"><span>未读留言</span><b id="c">-</b></div></div>
<script>(async()=>{if(!await requireAdmin())return;const [x,y,z]=await Promise.all([supabaseClient.from("projects").select("*",{count:"exact",head:true}),supabaseClient.from("projects").select("*",{count:"exact",head:true}).eq("status","published"),supabaseClient.from("messages").select("*",{count:"exact",head:true}).eq("status","unread")]);a.textContent=x.count??0;b.textContent=y.count??0;c.textContent=z.count??0})();</script></main></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/js/config.js"></script><script src="assets/js/common.js"></script></body></html>
